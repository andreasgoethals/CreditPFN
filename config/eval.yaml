# =============================================================================
#  CreditPFN — eval / final-benchmark configuration
# =============================================================================
#  Drives `scripts/eval_pipeline.py`. For each (model × test dataset) it
#  runs K-fold CV (outer 80/20; inner 80/20 of the train fold for HPO
#  and F1-threshold tuning) and writes one CSV per (method, run, ts) at
#
#      <results.base_dir>/<TRACK>/<method>/<run_name>_<timestamp>.csv
#
#  The training pipeline lives in `config/train.yaml`; the cross-cutting
#  knobs (seed, run_name, track, corpus split) are inherited from there.
#  Anything that's never changed across runs (metric column order,
#  TabPFN inference-time defaults, processed-CSV path layout) is
#  hardcoded in code.
# =============================================================================


# Inherit shared knobs (seed, run_name, track, corpus split) from the
# training config.
train_cfg_path: "config/train.yaml"


# Which classical baselines to include. "logreg" is silently ignored on
# lgd; "linreg" is silently ignored on pd.
baselines:
  enabled:
    - "xgboost"
    - "catboost"
    - "logreg"
    - "linreg"
    - "tabpfn-untuned"


# K-fold CV per test dataset (stratified for classification, plain
# KFold for regression). Inner val split is used for both Optuna HPO
# and F1-threshold tuning.
cv:
  n_folds: 5
  inner_val_fraction: 0.20      # 64/16/20 train/val/test of the dataset


# TabPFN-2.6 architectural in-context limit. wICE H100 NVL (96GB) lets
# us push to 100k cleanly. Non-TabPFN baselines have no such cap and
# run on the full data; see `hpo.<m>.max_rows` for HPO-only subsampling.
max_rows_tabpfn: 100000


# Per-fold Optuna budget for the boosting baselines. HPO objective is
# computed on the inner-val split (same as F1-threshold tuning).
hpo:
  xgboost:
    n_trials: 25
    timeout_seconds: 600
    max_rows: 50000          # stratified subsample of the train fold (HPO only)
  catboost:
    n_trials: 25
    timeout_seconds: 600
    max_rows: 50000


# TabPFN inference-time estimators (sklearn API), shared by untuned and
# trained variants. 4 is the package default; 16 trades inference time
# for slightly better accuracy/calibration.
tabpfn_n_estimators: 16


# Output root. Benchmark CSVs land under <base_dir>/<TRACK>/<method>/...
# Training per-epoch CSVs land under results/training/<track>/<...>.csv
# (written by the training pipeline, not configurable here).
results:
  base_dir: "results/benchmark"
