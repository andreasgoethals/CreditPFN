# =============================================================================
#  CreditPFN — training configuration
# =============================================================================
#  Only tunable knobs live here. Anything that doesn't change between runs
#  (optimizer family, scheduler type, multi-chunk policy, AdamW betas, …)
#  is hardcoded in `src/train/loop.py`.
#
#  The training pipeline produces continued-pretrained checkpoints only.
#  Scoring is the eval pipeline's job (`scripts/eval_pipeline.py`).
#
#  Hydra-style overrides on the CLI:
#      python scripts/train_pipeline.py train.epochs=10 track=lgd
# =============================================================================


# =============================================================================
#  Section 0 · Tunable hyperparameters (sweep over the cartesian product)
# =============================================================================
#  Brackets both LR regimes:
#    * single-dataset finetuning (Rubachev 2025 / TabPFN's
#      FinetunedTabPFNClassifier): 1e-5
#    * multi-dataset continued pretraining (TabPFN-Wide 2026): 1e-4
#  See docs/CHECKPOINTS.md for the synthetic-vs-real-finetuned distinction
#  among the base checkpoints.

tunable:
  classifier_base_paths:
    - "checkpoints/tabpfn-v3-classifier-v3_default.ckpt"        # v3 synthetic-only (NEW, recommended)
    - "checkpoints/tabpfn-v2.6-classifier-v2.6_default.ckpt"    # v2.6 synthetic-only
    - "checkpoints/tabpfn-v2.5-classifier-v2.5_default-2.ckpt"  # v2.5 synthetic-only (Real-TabPFN ablation)
    - "checkpoints/tabpfn-v2.5-classifier-v2.5_default.ckpt"    # v2.5 real-finetuned (stack on top of Real-TabPFN)

  regressor_base_paths:
    - "checkpoints/tabpfn-v3-regressor-v3_default.ckpt"         # v3 synthetic-only (NEW, recommended)
    - "checkpoints/tabpfn-v2.6-regressor-v2.6_default.ckpt"     # v2.6 synthetic-only
    - "checkpoints/tabpfn-v2.5-regressor-v2.5_default.ckpt"     # v2.5 synthetic-only
    - "checkpoints/tabpfn-v2.5-regressor-v2.5_real.ckpt"        # v2.5 real-finetuned

  learning_rates: [1.0e-5, 5.0e-5, 1.0e-4, 5.0e-4]

  # Whether to wrap the base model with a LoRA adapter before training
  # (Hu et al. 2021). With `use_lora: true` the base TabPFN weights are
  # frozen and only the LoRA A/B matrices receive gradients — typically
  # 1–5 % of full-model parameters. Rubachev 2025 ("On Finetuning Tabular
  # Foundation Models") finds full FT > LoRA on most datasets but LoRA
  # captures 90–95 % of the gain at a fraction of compute. The LoRA
  # adapter is merged back into the base weights at save time, so the
  # resulting .ckpt loads via the standard TabPFN loader without any
  # PEFT dependency.
  use_lora: [false, true]


# =============================================================================
#  Section 1 · Cross-cutting knobs
# =============================================================================

seed: 42
run_name: "creditpfn"
device: "auto"           # "auto" | "cuda" | "cpu"
track: "pd"              # "pd" (classifier) | "lgd" (regressor)

# The training corpus location is taken from `paths.data_source` in
# config/data.yaml (single source of truth). To flip between scratch
# and durable storage, change it there — the train pipeline reads
# that file at startup before resolving cfg.corpus.cached_dir.


# =============================================================================
#  Section 2 · Corpus split (train / test by dataset_id)
# =============================================================================
#  No validation set — by design. Variants are kept and compared post-hoc
#  in the eval stage. The `test_dataset_ids` here are recorded as metadata
#  in each checkpoint's `.provenance.json` so the eval knows which test
#  set to score against; the training loop itself never reads test rows.

corpus:
  cached_dir: "data/cached"

  # Mode A — fraction-based (default; both _dataset_ids lists empty).
  train_fraction: 0.7
  test_fraction:  0.3

  # Mode B — explicit ID lists (override Mode A; useful for debug / outer drivers).
  # E.g. train_dataset_ids: ["0001.gmsc"]
  train_dataset_ids: []
  test_dataset_ids:  []


# =============================================================================
#  Section 3 · Optimizer + LR schedule
# =============================================================================
#  Always AdamW (betas (0.9, 0.999)) with linear-warmup → cosine-decay.

optimizer:
  weight_decay: 0.01

scheduler:
  warmup_fraction: 0.10    # TabPFN's FinetunedTabPFNClassifier default


# =============================================================================
#  Section 4 · LoRA adapter (used only when `tunable.use_lora == true`)
# =============================================================================
#  Default targets match TabPFN's attention layer naming
#  (see repositories/TabPFN .txt:15430-15442). Adjust for v3 if the
#  multi-stage architecture exposes different module names.

lora:
  r:                 8
  alpha:             16
  dropout:           0.10
  target_modules:    ["q_projection", "k_projection", "v_projection", "out_projection"]


# =============================================================================
#  Section 5 · Training loop
# =============================================================================

train:
  epochs: 50                            # no early stopping — fixed-epoch
  accumulate_grad_batches: 1
  grad_clip_norm: 1.0
  amp: true                             # AMP autocast (CUDA only)

  # Per-step context+query sample count.
  #
  # THIS IS THE TabPFN-DOCUMENTED DEFAULT.
  # `FinetunedTabPFNClassifier.__init__` in the upstream `tabpfn` package
  # (`repositories/TabPFN .txt:26832` and `:27467`) hard-codes
  #     n_finetune_ctx_plus_query_samples: int = 10_000
  # — the value Prior Labs themselves recommend for any fine-tune.
  #
  # WHY THE NUMBER MATTERS DURING TRAINING.
  # TabPFN-v3's `inference_row_chunk_size = 2048` (`TabPFN .txt:17650`)
  # only kicks in for INFERENCE, where gradients aren't kept and the
  # forward can be chunked. During FINE-TUNING the activations of the
  # full forward must be retained for backward, so peak VRAM scales
  # with `rows × features × hidden × layers`. Empirically on a 79 GB
  # H100 with the v3 default model (54M params, ~12 layers per stage):
  #   * 100 000 rows → 77 GB allocated → OOM (this was the misguided default)
  #   *  50 000 rows → still 77 GB allocated → OOM (confirmed 2026-05-20)
  #   *  10 000 rows → ≈ 16 GB allocated → comfortable headroom
  #   *   5 000 rows → ≈ 8 GB allocated → safe on any 16 GB+ card
  # Memory is roughly linear in rows once the model is loaded, so the
  # 80 GB H100 sweet spot really is the documented 10 k.
  #
  # If a future card or a v3 with row-chunked training enabled gives
  # you room, you can raise this knob. Until then, leave it at 10_000.
  n_finetune_ctx_plus_query_samples: 10000

  # Fraction of those rows that go to the query split (matches TabPFN's
  # `finetune_ctx_query_split_ratio = 0.20`).
  finetune_ctx_query_split_ratio: 0.20

  dataloader_workers: 0                 # 0 = main process only (GPU is the bottleneck)

  # Per-epoch evaluation: at the end of every epoch we score the model
  # on a small subsample of each training- and test-dataset and write
  # the result to output/training/epochs/<track>/<descriptive_name>.csv. The
  # primary metric is ROC-AUC for PD (classification) and RMSE for LGD
  # (regression). Set `epoch_eval_subsample_samples` to 0 to disable the
  # check (saves wall-clock for debug runs).
  epoch_eval_subsample_samples: 500


# =============================================================================
#  Section 6 · Checkpoint output
# =============================================================================
#  Final-epoch weights → `cfg.checkpoint.trained_dir/<track>/<descriptive_name>.ckpt`
#  in Prior Labs format. A sidecar `<...>.ckpt.provenance.json` records the
#  hyperparameters, training/test dataset IDs, training time, and GPU used —
#  that's what the eval pipeline reads to know which test set goes with which
#  checkpoint.
#
#  Filename: <run_name>_<track>_<base-stem>_lr<lr>_seed<seed>[_lora].ckpt

checkpoint:
  trained_dir: "checkpoints/trained"
