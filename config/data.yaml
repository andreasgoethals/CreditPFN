# =============================================================================
# CreditPFN — data-pipeline configuration
# =============================================================================
# This is the single source of truth for every non-obvious choice made by
# any script in `src/data/`. Knobs are grouped by the *first* script that
# consumes them, in execution order:
#
#     1. preprocessing.py   → cfg.preprocessing.*
#     2. register.py        → cfg.register.*
#     3. sanitize.py        → cfg.sanitize.*
#     4. dedup.py           → cfg.dedup.*
#     5. dataset.py         → cfg.dataset.*
#
# Cross-cutting keys (paths, seeds, network) are pulled out at the top.
# Every key has a comment explaining (a) what it does and (b) why this
# default — anything that is "an obvious choice" is hardcoded in the
# Python files instead of living here.
#
# All scripts load this file with OmegaConf.load(). Override any key on
# the CLI via Hydra-style syntax, e.g.
#
#     python -m src.data.sanitize sanitize.max_columns=64
# =============================================================================

# -----------------------------------------------------------------------------
# Reproducibility
# -----------------------------------------------------------------------------
seed: 42                         # global RNG seed; every script derives its
                                 # local seed from this so re-running the whole
                                 # pipeline is bit-for-bit reproducible

# -----------------------------------------------------------------------------
# Filesystem layout
# -----------------------------------------------------------------------------
# All paths are relative to the repository root (i.e. the directory from
# which `python -m src.data.<name>` is invoked). Absolute paths also work.
paths:
  raw:               data/raw                      # data/raw/{pd,lgd}/<id>.csv
  processed:         data/processed                # sanitize.py writes here
  cached:            data/cached                   # dataset.py writes .npz here
  dedup:             data/dedup                    # 4× doubles_*_{pre,post}.csv
  manifest_pd:       data/manifest_pd.csv          # register.py output (PD)
  manifest_lgd:      data/manifest_lgd.csv         # register.py output (LGD)

# =============================================================================
# 1. preprocessing.py — dataset-specific surgical fixes
# =============================================================================
# preprocessing.py has very few configurable knobs because, by design, every
# fix is hardcoded per dataset_id (drop column X, decode value Y, etc.).
# These keys only control how the module behaves when invoked as a smoke-test
# entry point.
preprocessing:
  # If a dataset_id is encountered for which no surgical-fix routine is
  # registered, what should happen?
  #   "error"  → raise; useful when expanding the corpus, you want to be
  #              told you forgot to register a new dataset.
  #   "passthrough" → return df unchanged; useful when iterating on the
  #                   sanitize stage and you don't care about per-dataset
  #                   fixes yet.
  unknown_dataset_policy: "error"

# =============================================================================
# 2. register.py — manifest construction
# =============================================================================
register:
  # Idempotency policy for re-runs. Always true unless you want the manifest
  # to grow append-only (we never do).
  idempotent: true

  # The shape-hash baked into each manifest row is used by dedup for the
  # (source, dataset_id) and (name, n_rows, n_cols, task_type) checks. The
  # hash includes the sorted column-name list so that two datasets with the
  # same shape but reordered columns still hash identically.
  shape_hash_includes_sorted_colnames: true

# =============================================================================
# 3. sanitize.py — dataset-agnostic preprocessing
# =============================================================================
# Every step here is dataset-agnostic. Per-dataset surgical fixes belong in
# preprocessing.py. See repositories/REPOSITORIES.md "Outlier handling: what
# TabPFN actually does" for why we deliberately don't winsorize numerical
# columns here — TabPFN's package handles outliers internally at fit time.
sanitize:

  # --- Step (b) drop exact-duplicate columns -------------------------------
  drop_exact_duplicate_columns: true

  # --- Steps (c)/(d) drop high-NaN-rate columns ---------------------------
  # Dataset-agnostic; per-dataset overrides go in preprocessing.py if needed.
  # 0.90 is conservative — it only drops columns that are basically missing.
  max_missing_rate: 0.90

  # --- Step (e) drop constant columns -------------------------------------
  # MUST be true: TabPFN's encoder steps error on constant inputs.
  drop_constant_columns: true

  # --- Step (f) coerce numeric strings to numeric -------------------------
  # When an object column is mostly numeric strings, coerce with
  # pd.to_numeric(errors='coerce'). Threshold is the minimum fraction of
  # non-NaN entries that must successfully parse before we coerce.
  coerce_numeric_strings: true
  coerce_numeric_threshold: 0.95   # if ≥95% of non-NaN values parse → coerce

  # --- Step (g) numerical dtype -------------------------------------------
  numeric_dtype: "float32"         # TabPFN's default; halves memory vs. f64
  keep_nans: true                  # NEVER impute — the architecture's
                                   # NanHandlingEncoderStep handles them

  # --- Step (h) ±inf handling ---------------------------------------------
  # Replace ±inf with NaN; uniform downstream handling. Mandatory.
  replace_inf_with_nan: true

  # --- Step (i) FeatureAgglomeration --------------------------------------
  # Reduce feature count to ≤ max_columns when above. Matches v2.6's prior
  # of "expects up to ~500 features per estimator, but trained predominantly
  # on ≤ 100-feature datasets" — 128 keeps us in the well-trained regime
  # while still using more features than v2's hard 100-cap.
  max_columns: 128
  agglomeration:
    enabled: true
    metric: "euclidean"            # Ward linkage requires euclidean
    linkage: "ward"
    standardize_for_distance_only: true   # fit StandardScaler ONLY for the
                                          # distance computation; the final
                                          # output uses the unscaled means
    restrict_to_numerical: true    # never agglomerate categoricals; if the
                                   # numerical-only count still exceeds
                                   # (max_columns - n_categoricals), reduce
                                   # the numericals to bring total ≤ max

  # --- Step (j) classification target encoding ----------------------------
  classification_target_to_int64_contiguous: true   # required by TabPFN

  # --- Step (k) regression target ----------------------------------------
  # Do NOT z-normalise here. TabPFN's RegressorBatch.znorm_space_bardist_
  # handles target normalisation internally and inverts it at predict time.
  standardize_regression_target: false

  # --- LGD domain constraint ---------------------------------------------
  # LGD is a fraction-of-loss; values outside [0, 1] are data quality bugs.
  # Domain constraint, not a statistical operation, so applied here cleanly.
  lgd_target_clip:
    enabled: true
    lower: 0.0
    upper: 1.0

# =============================================================================
# 4. dedup.py — duplicate detection within each track
# =============================================================================
# Two passes:
#   --pass pre    runs over data/raw/{pd,lgd}/*.csv
#   --pass post   runs over data/processed/{pd,lgd}/*.sanitized.csv
# Output: 4 CSVs total (2 tracks × 2 passes), under cfg.paths.dedup.
# A dataset that is *legitimately* in both PD and LGD folders is allowed —
# we do not flag cross-track overlap.
dedup:

  # --- Check 1: identifier match ------------------------------------------
  # Per Garg et al. 2025 §3 "Data Contamination", check 1.
  # Always on; no knobs.

  # --- Check 2: column-name Jaccard + identical shape ---------------------
  name_jaccard_threshold: 0.80     # ≥ 0.80 AND identical (n_rows, n_cols)
                                   # → flag as suspect

  # --- Check 3: row-level SHA-256 -----------------------------------------
  # After per-row column-sorted serialisation. Non-empty intersection of
  # row-hash sets between two datasets → flag.
  row_hash_intersection_min: 1

  # --- Check 4: column-level SHA-256 --------------------------------------
  # Hash each column after sorting its values; pairs sharing ≥ N
  # "non-trivial" columns (each with > unique_min unique values) → flag.
  shared_columns_min: 3
  column_nontrivial_unique_min: 10

  # --- Extra check A: rounded-row hash ------------------------------------
  # Re-hash every row after rounding floats to N decimals; catches near-
  # identical datasets that diverged only via CSV/parquet float-precision
  # round-trips. Set decimals=null to disable.
  rounded_row:
    enabled: true
    decimals: 6

  # --- Extra check B: subset detection ------------------------------------
  # If row-hash set of dataset A is a subset of dataset B (modulo a small
  # fraction missing), flag A as "subset of B".
  subset:
    enabled: true
    min_overlap_fraction: 0.95     # |A ∩ B| / |A| ≥ this → subset relation

  # --- Extra check C: fuzzy column-name match -----------------------------
  # Catches schemas that differ only by typos / casing (e.g.
  # ``loan_amount`` vs ``loanamount``). Uses rapidfuzz's token-set
  # ratio (0–100; ≥ 90 → consider names equivalent).
  #
  # Two flags so we can run it where it is informative and skip it where
  # it is a guaranteed false-positive source:
  #   enabled_pre  → run on the raw-CSV pass. Useful: original column
  #                  names are still present and may genuinely differ
  #                  by typo. Default true.
  #   enabled_post → run on the sanitised pass. By then sanitize.py's
  #                  FeatureAgglomeration has overwritten the column
  #                  names of any reduced dataset with synthetic
  #                  ``feat_agglo_0000``..``feat_agglo_0127`` strings,
  #                  which collide trivially across any two reduced
  #                  datasets. Default false.
  column_name_fuzzy:
    enabled_pre: true
    enabled_post: false
    similarity_threshold: 90

  # --- Confidence labelling ------------------------------------------------
  # Maps the set of triggered checks to a confidence label. Order matters:
  # the first matching label wins.
  confidence_rules:
    high:   ["id_match", "row_hash"]                 # any of these alone → high
    medium: ["col_hash", "name_jaccard_and_shape"]
    low:    ["rounded_row", "subset", "fuzzy_names"]

  # --- Pass-overwrite policy ----------------------------------------------
  # On each invocation, the prior CSV for that pass is deleted before we
  # write a fresh one. Always true; turning off would silently let stale
  # results accumulate.
  overwrite_existing_pass_csv: true

# =============================================================================
# 5. dataset.py — chunking and caching
# =============================================================================
# Reads sanitized CSVs and the manifest, splits each dataset into fixed-size
# chunks (stratified for PD, random for LGD), splits each chunk into
# context+query (60/40), encodes categoricals lazily, writes one .npz per
# chunk under data/cached/{track}/<id>/chunk_NNN.npz.
dataset:

  # --- Chunking ------------------------------------------------------------
  # Datasets larger than max_rows_per_chunk become multiple .npz files.
  # 20 000 matches Real-TabPFN §4 (Garg et al.). Smaller chunks = more
  # gradient updates per epoch but each step sees less context.
  max_rows_per_chunk: 20000
  min_chunk_size: 2000             # drop the tail chunk if it would be
                                   # smaller than this; matches TabPFN's own
                                   # `shuffle_and_chunk_data` default

  equal_split_size: true           # true → equal-sized chunks all
                                   # ≤ max_rows_per_chunk; avoids the bias
                                   # toward 20 000-row chunks that arises
                                   # when the dataset size is not a clean
                                   # multiple of max_rows_per_chunk. Set
                                   # to false to match TabPFN's own default
                                   # ``shuffle_and_chunk_data`` behaviour.

  # --- PD-specific stratification -----------------------------------------
  # Use sklearn StratifiedKFold semantics — each chunk has class proportions
  # within ε of the parent's. LGD (regression) → random shuffle only.
  stratify_classification: true

  # --- Context / query split ----------------------------------------------
  # Per Garg et al. 2025 §4: 60% context, 40% query, per chunk.
  context_fraction: 0.60

  # --- Categorical encoding -----------------------------------------------
  # Applied at cache-write time. Identical to the sklearn-style snippet in
  # repositories/TabPFN V2 Finetuning.txt:562 — the canonical idiom for
  # feeding TabPFN. Note encoded_missing_value=NaN so downstream NaN
  # handling stays uniform.
  categorical_encoding:
    strategy: "ordinal"
    handle_unknown: "use_encoded_value"
    unknown_value: -1
    encoded_missing_value: "nan"   # the string "nan" → np.nan in code

  # --- Cache dtype ---------------------------------------------------------
  # X arrays use the sanitize.numeric_dtype above (float32). y dtype depends
  # on track: int64 for classification, float32 for regression. Kept here
  # so dataset.py never has to look at sanitize.* for X.
  y_dtype_classification: "int64"
  y_dtype_regression:     "float32"

  # --- Re-run policy -------------------------------------------------------
  # If true, an existing chunk_NNN.npz with a matching meta.json is left
  # alone (idempotent); set false to force re-write of every chunk.
  skip_if_cached: true
