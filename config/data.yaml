# =============================================================================
#  CreditPFN — data-pipeline configuration
# =============================================================================
#  Only the knobs that are genuinely tunable live here. Everything that is
#  always-the-same (`unknown_dataset_policy='error'`, `keep_nans=True`,
#  `replace_inf_with_nan=True`, etc.) is hardcoded in the corresponding
#  module so this file stays scannable.
#
#  Override on the CLI Hydra-style:
#
#      python scripts/data_pipeline.py dataset.max_rows_per_chunk=20000
# =============================================================================

# Global seed — every stage derives a deterministic local seed from this so
# re-running is bit-for-bit reproducible.
seed: 42

# Paths are interpreted by `src.utils.paths`:
#   raw / processed / cached → wherever `data_source` points (see below).
#   dedup / manifest_*       → ALWAYS the durable "data" location
#                              ($VSC_DATA/CreditPFN on VSC, repo root locally).
paths:
  # Where the data corpus lives — raw inputs AND the processed/cached outputs.
  # Two values:
  #   "scratch" — $VSC_SCRATCH/383/<user>/CreditPFN/data/...  (VSC fast-purge area)
  #   "data"    — $VSC_DATA/leuven/383/<user>/CreditPFN/data/... (VSC durable storage)
  # Ignored on a laptop (no $VSC_DATA / $VSC_SCRATCH — the repo's own data/
  # folder is always used).
  data_source:   "data"

  raw:           data/raw                # data/raw/{pd,lgd}/<id>.csv
  processed:     data/processed          # sanitize.py output
  cached:        data/cached             # dataset.py output (.npz chunks)
  dedup:         data/dedup              # 4× doubles_*_{pre,post}.csv (always durable)
  manifest_pd:   data/manifest_pd.csv    # always durable
  manifest_lgd:  data/manifest_lgd.csv   # always durable


# -----------------------------------------------------------------------------
#  sanitize.py — dataset-agnostic cleaning
# -----------------------------------------------------------------------------
sanitize:
  # Drop feature columns with NaN-rate > this. Conservative: only kills
  # columns that are essentially missing.
  max_missing_rate: 0.90

  # Coerce mostly-numeric object columns to numeric. Threshold = fraction of
  # non-NaN values that must parse before we commit.
  coerce_numeric_strings: true
  coerce_numeric_threshold: 0.95

  # FeatureAgglomeration cap — clamp to ≤ max_columns when above. 128 keeps
  # us in TabPFN-2.x's well-trained regime while exceeding v2's hard 100 cap.
  max_columns: 128
  agglomeration:
    enabled: true
    # Distance metric for Ward linkage; standardize for distance computation
    # only (the OUTPUT features are still the means of the unscaled originals,
    # so TabPFN sees the distribution it was trained on).
    metric: "euclidean"
    linkage: "ward"
    standardize_for_distance_only: true
    # Note: agglomeration always operates on numerical columns only —
    # categoricals pass through unchanged. This isn't a toggle (the
    # behaviour is hardcoded in _agglomerate_to_max_columns) so it
    # was previously exposed here as a dead config key; removed.

  # LGD-only domain constraint — values outside [0, 1] are data-quality bugs.
  # This is the single source of truth for LGD clipping; per-dataset surgical
  # fixes do NOT clip themselves.
  lgd_target_clip:
    enabled: true
    lower: 0.0
    upper: 1.0


# -----------------------------------------------------------------------------
#  dedup.py — within-track duplicate detection (per track, per pass)
# -----------------------------------------------------------------------------
dedup:
  # Check 2 — column-name Jaccard ≥ this AND identical shape.
  name_jaccard_threshold: 0.80

  # Check 3 — any non-empty intersection of row-level hashes flags the pair.
  row_hash_intersection_min: 1

  # Check 4 — column-level hash; pair must share ≥ N "non-trivial" columns
  # (where non-trivial = column with > column_nontrivial_unique_min uniques).
  shared_columns_min: 3
  column_nontrivial_unique_min: 10

  # Extra A — rounded-row hash catches float-precision near-duplicates.
  rounded_row:
    enabled: true
    decimals: 6

  # Extra B — subset detection: |A ∩ B| / |A| ≥ this → A ⊆ B.
  subset:
    enabled: true
    min_overlap_fraction: 0.95

  # Extra C — fuzzy column-name match. Useful pre-sanitize (real names still
  # present, typos differ); useless post-sanitize (FeatureAgglomeration
  # renames columns to `feat_agglo_0000`..`0127`).
  column_name_fuzzy:
    enabled_pre: true
    enabled_post: false
    similarity_threshold: 90       # rapidfuzz token-set ratio, 0–100

  # Maps the set of triggered checks to a confidence label. First-matching
  # category wins.
  confidence_rules:
    high:   ["id_match",    "row_hash"]
    medium: ["col_hash",    "name_jaccard_and_shape"]
    low:    ["rounded_row", "subset", "fuzzy_names"]


# -----------------------------------------------------------------------------
#  dataset.py — chunking + numpy caching
# -----------------------------------------------------------------------------
dataset:
  # Datasets > max_rows_per_chunk become multiple .npz chunks. 100,000 is
  # tuned for wICE H100 NVL GPUs (96 GB VRAM); lower if memory-constrained.
  # CHANGING THIS requires re-running the data pipeline.
  max_rows_per_chunk: 100000

  # Drop the tail chunk if its size would fall below this (matches TabPFN's
  # `shuffle_and_chunk_data` default).
  min_chunk_size: 2000

  # If true, prefer equal-sized chunks all ≤ max_rows_per_chunk (avoids bias
  # toward maxed-out chunks when the dataset doesn't divide cleanly).
  equal_split_size: true

  # Per Garg et al. 2025 §4: 60% context, 40% query per chunk.
  context_fraction: 0.60

  # Skip cache writes when fingerprint (manifest row + processed CSV +
  # dataset config + schema version) is unchanged. Set false to force
  # rewrite of every chunk.
  skip_if_cached: true
